name: Generate JavaDoc

on:
  push:
    branches: [ main ]

jobs:
  javadoc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Очищуємо папку docs перед генерацією, щоб видалити старі файли документації
      - name: Clean docs folder
        run: rm -rf docs/

      # Запускаємо генерацію (вона сама створить актуальну папку docs/ згідно з конфігурацією вашого pom.xml)
      - name: Generate JavaDoc
        run: mvn process-sources javadoc:javadoc --no-transfer-progress

      # Крок копіювання повністю видалено, оскільки файли вже генеруються безпосередньо у папку docs/

      - name: Commit and push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/
          git diff --staged --quiet || git commit -m "docs: auto-generate javadoc [skip ci]"
          git push
